<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGX Password Vault</title>
<!-- Prevent browser from caching page contents (passwords in DOM) -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0e14;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-glow: rgba(88,166,255,0.25);
    --danger: #f85149;
    --danger-glow: rgba(248,81,73,0.25);
    --success: #3fb950;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(88,166,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(248,81,73,0.04) 0%, transparent 60%);
  }
  .app-container { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 20px; }

  .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
  .header h1 .logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #58a6ff, #3fb950); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: 0 0 16px var(--accent-glow); }
  .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; border: 1px solid var(--border); background: var(--surface); }
  .status-badge .dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-badge.connected .dot { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .status-badge.disconnected .dot { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: var(--shadow); }
  .card-title { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 16px; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 18px; border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 600; font-family: var(--font); border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.15s ease; white-space: nowrap; }
  .btn:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.15); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #4090e0; box-shadow: 0 0 20px var(--accent-glow); }
  .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: rgba(248,81,73,0.1); box-shadow: 0 0 16px var(--danger-glow); }
  .btn-sm { padding: 5px 12px; font-size: 0.78rem; }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-icon { padding: 6px 10px; font-size: 0.85rem; }

  .input { width: 100%; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: var(--text); font-size: 0.9rem; font-family: var(--font); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .input::placeholder { color: var(--text-dim); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }

  /* PIN screen */
  .pin-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 300; }
  .pin-box { text-align: center; }
  .pin-box h2 { font-size: 1.3rem; margin-bottom: 8px; }
  .pin-box .sub { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 24px; }
  .pin-input { width: 200px; padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: var(--text); font-size: 1.2rem; font-family: var(--mono); text-align: center; letter-spacing: 0.3em; outline: none; }
  .pin-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .pin-error { color: var(--danger); font-size: 0.85rem; margin-top: 12px; min-height: 20px; }

  /* Lock overlay */
  .lock-overlay { position: fixed; inset: 0; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); background: rgba(11,14,20,0.85); display: flex; align-items: center; justify-content: center; z-index: 200; }

  /* Service list */
  .search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
  .search-bar .input { flex: 1; }
  .service-list { display: flex; flex-direction: column; gap: 2px; }
  .service-item { display: flex; align-items: center; padding: 14px 16px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.12s; gap: 12px; border: 1px solid transparent; }
  .service-item:hover { background: var(--surface-hover); border-color: var(--border); }
  .service-item.selected { background: var(--accent-glow); border-color: var(--accent); }
  .service-item .svc-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .service-item .svc-name { font-weight: 600; font-size: 0.92rem; }
  .service-item .svc-user { font-size: 0.78rem; color: var(--text-dim); }
  .service-item .item-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.12s; flex-shrink: 0; }
  .service-item:hover .item-actions { opacity: 1; }

  /* Inline detail panel */
  .detail-panel { margin-top: 12px; padding: 16px; background: rgba(0,0,0,0.2); border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .detail-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
  .detail-row .dl { width: 85px; flex-shrink: 0; font-size: 0.78rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
  .detail-row .dv { flex: 1; font-family: var(--mono); font-size: 0.88rem; word-break: break-all; user-select: all; }
  .detail-row .dv.masked { font-family: var(--font); letter-spacing: 0.25em; user-select: none; cursor: pointer; }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #161b22; border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 440px; box-shadow: 0 16px 48px rgba(0,0,0,0.6); max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* Toast */
  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 400; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 12px 20px; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600; animation: slideIn 0.25s ease; box-shadow: 0 4px 16px rgba(0,0,0,0.4); border: 1px solid var(--border); background: var(--surface); backdrop-filter: blur(12px); max-width: 380px; }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-dim); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }

  @media (max-width: 500px) {
    body { padding: 12px; }
    .card { padding: 16px; }
    .header h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<!-- ============================================================
     Unlock Screen
     ============================================================ -->
<div class="pin-overlay" id="pinScreen">
  <div class="pin-box">
    <div style="font-size:3rem;margin-bottom:12px;">🔐</div>
    <h2>SGX Vault</h2>
    <p class="sub">Set a PIN (4–8 digits) to protect your vault</p>
    <input class="pin-input" id="pinInput" type="password" maxlength="8" placeholder="••••" autofocus>
    <div class="pin-error" id="pinError"></div>
  </div>
</div>

<!-- ============================================================
     Lock Overlay (shown after timeout or manual lock)
     ============================================================ -->
<div class="lock-overlay" id="lockScreen" style="display:none;">
  <div class="pin-box">
    <div style="font-size:3rem;margin-bottom:12px;">🔒</div>
    <h2>Vault Locked</h2>
    <p class="sub">Enter your PIN to unlock</p>
    <input class="pin-input" id="lockPinInput" type="password" maxlength="8" placeholder="••••">
    <div class="pin-error" id="lockPinError"></div>
  </div>
</div>

<!-- ============================================================
     Main App
     ============================================================ -->
<div class="app-container" id="mainApp">
  <div class="header">
    <h1><span class="logo">🔐</span>SGX Vault</h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="statusBadge" class="status-badge disconnected">
        <span class="dot"></span><span id="statusText">Checking...</span>
      </span>
      <button class="btn btn-sm btn-danger" id="lockBtn" title="Lock vault">🔒 Lock</button>
    </div>
  </div>

  <div class="card" id="vaultActionsCard">
    <div class="card-title">Vault</div>
    <div class="btn-group" id="vaultActions"></div>
  </div>

  <div class="card" id="listCard" style="display:none;">
    <div class="card-title">
      Services
      <span style="color:var(--text-dim);font-weight:400;text-transform:none;margin-left:8px;font-size:0.8rem;" id="itemCount"></span>
    </div>
    <div class="search-bar">
      <input class="input" id="searchInput" placeholder="Search services or usernames..." type="text">
      <button class="btn btn-primary" id="addBtn">+ Add</button>
    </div>
    <div class="service-list" id="serviceList">
      <div class="empty-state"><div class="icon">📭</div><p>No credentials yet. Click "+ Add" to store your first password.</p></div>
    </div>
    <div id="detailPanel" style="display:none;"></div>
  </div>
</div>

<!-- ============================================================
     Add / Edit Modal
     ============================================================ -->
<div class="overlay" id="modalOverlay" style="display:none;">
  <div class="modal">
    <h2 id="modalTitle">Add Credential</h2>
    <div class="form-group">
      <label>Service Name</label>
      <input class="input" id="modalService" placeholder="e.g. google.com" type="text">
    </div>
    <div class="form-group">
      <label>Username</label>
      <input class="input" id="modalUsername" placeholder="e.g. alice@example.com" type="text">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="input" id="modalPassword" placeholder="Enter password" type="password">
    </div>
    <div class="modal-actions">
      <button class="btn" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalSave">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================
// Security constants
// ============================================================
const API_BASE = 'http://127.0.0.1:8848';
const AUTO_LOCK_SEC = 300;          // auto-lock after 5 min inactivity
const PASSWORD_MASK_SEC = 60;       // auto-mask plaintext password after 60s
const DEFAULT_PIN = '0000';         // default PIN — user should change
const PIN_MIN_LENGTH = 4;

// ============================================================
// Security state — NEVER persisted to localStorage/sessionStorage
// ============================================================
let vaultPIN = DEFAULT_PIN;
let unlocked = false;
let lockTimer = null;
let maskTimer = null;               // auto-mask password timer

// ============================================================
// App state
// ============================================================
let currentService = null;
let showPassword = false;
let passwordPlain = '';
let allItems = [];   // [{service, username}] from /api/list-detail

// ============================================================
// Helpers
// ============================================================

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE + path, opts);
  return res.json();
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; }, 2500);
  setTimeout(() => el.remove(), 2900);
}

function setConnected(ok) {
  const badge = document.getElementById('statusBadge');
  const text = document.getElementById('statusText');
  badge.className = 'status-badge ' + (ok ? 'connected' : 'disconnected');
  text.textContent = ok ? 'SGX Enclave Connected' : 'Disconnected';
}

// ============================================================
// Auto-lock
// ============================================================

function resetLockTimer() {
  if (lockTimer) clearTimeout(lockTimer);
  if (!unlocked) return;
  lockTimer = setTimeout(doLock, AUTO_LOCK_SEC * 1000);
}

function doLock() {
  unlocked = false;
  if (lockTimer) clearTimeout(lockTimer);
  wipeSensitiveData();
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('lockPinInput').value = '';
  document.getElementById('lockPinError').textContent = '';
  document.getElementById('lockPinInput').focus();
}

// Wipe all plaintext passwords from DOM and JS memory
function wipeSensitiveData() {
  if (maskTimer) { clearTimeout(maskTimer); maskTimer = null; }
  passwordPlain = '';
  showPassword = false;
  currentService = null;
  // Remove detail panel with plaintext password from DOM entirely
  const panel = document.getElementById('detailPanel');
  if (panel) { panel.style.display = 'none'; panel.innerHTML = ''; }
}

['click', 'keydown', 'mousemove', 'touchstart'].forEach(evt => {
  document.addEventListener(evt, resetLockTimer);
});

// Wipe sensitive data when page is hidden / closed (prevents bfcache leak)
window.addEventListener('pagehide', wipeSensitiveData);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) wipeSensitiveData();
});

// ============================================================
// PIN / Unlock
// ============================================================

function tryUnlock(inputEl, errorEl, isInitial) {
  const pin = inputEl.value.trim();
  if (pin.length < PIN_MIN_LENGTH) {
    errorEl.textContent = `PIN must be at least ${PIN_MIN_LENGTH} digits.`;
    return;
  }
  if (pin === vaultPIN) {
    errorEl.textContent = '';
    unlocked = true;
    document.getElementById(isInitial ? 'pinScreen' : 'lockScreen').style.display = 'none';
    resetLockTimer();
    refreshUI();
  } else {
    errorEl.textContent = 'Incorrect PIN.';
    inputEl.value = '';
    inputEl.focus();
  }
}

document.getElementById('pinInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') tryUnlock(e.target, document.getElementById('pinError'), true);
});

document.getElementById('lockPinInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') tryUnlock(e.target, document.getElementById('lockPinError'), false);
});

document.getElementById('lockBtn').onclick = doLock;

// ============================================================
// Modal
// ============================================================

let modalMode = 'add';
let modalEditService = null;

async function showModal(mode, serviceName) {
  modalMode = mode;
  document.getElementById('modalOverlay').style.display = 'flex';
  document.getElementById('modalTitle').textContent = mode === 'add' ? 'Add Credential' : `Edit: ${serviceName}`;
  document.getElementById('modalService').value = '';
  document.getElementById('modalUsername').value = '';
  document.getElementById('modalPassword').value = '';

  if (mode === 'edit') {
    modalEditService = serviceName;
    document.getElementById('modalService').value = serviceName;
    document.getElementById('modalService').disabled = true;
    try {
      const r = await api('POST', '/api/get', { service: serviceName });
      if (r.ok) document.getElementById('modalUsername').value = r.username || '';
    } catch {}
  } else {
    modalEditService = null;
    document.getElementById('modalService').disabled = false;
  }
  resetLockTimer();
}

function hideModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

document.getElementById('modalCancel').onclick = hideModal;
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) hideModal();
});

document.getElementById('modalSave').onclick = async () => {
  const service = document.getElementById('modalService').value.trim();
  const username = document.getElementById('modalUsername').value.trim();
  const password = document.getElementById('modalPassword').value;

  if (!service) { toast('Service name is required.', 'error'); return; }
  if (!password) { toast('Password is required.', 'error'); return; }

  let result;
  if (modalMode === 'add') {
    result = await api('POST', '/api/add', { service, username, password });
  } else {
    result = await api('POST', '/api/update', { service: modalEditService, username, password });
  }

  if (result.ok) {
    toast(modalMode === 'add' ? 'Credential added.' : 'Credential updated.', 'success');
    hideModal();
    await loadServiceList();
    if (modalMode === 'edit' && currentService === modalEditService) {
      await selectService(modalEditService);
    }
    await api('POST', '/api/save');
  } else {
    toast(result.error || 'Operation failed.', 'error');
  }
  resetLockTimer();
};

// ============================================================
// Vault Actions
// ============================================================

async function refreshStatus() {
  try {
    const s = await api('GET', '/api/status');
    setConnected(s.ok);
    return s;
  } catch {
    setConnected(false);
    return { ok: false };
  }
}

async function doCreate() {
  const r = await api('POST', '/api/create', { pin: vaultPIN });
  if (r.ok) { toast('Vault created.', 'success'); await refreshUI(); }
  else { toast(r.error || 'Create failed.', 'error'); }
  resetLockTimer();
}

async function doLoad() {
  const r = await api('POST', '/api/load', { pin: vaultPIN });
  if (r.ok) { toast('Vault loaded.', 'success'); await refreshUI(); }
  else { toast(r.error || 'Load failed.', 'error'); }
  resetLockTimer();
}

async function doSave() {
  const r = await api('POST', '/api/save');
  if (r.ok) { toast(`Saved (${r.bytes || '?'} bytes).`, 'success'); }
  else { toast(r.error || 'Save failed.', 'error'); }
  resetLockTimer();
}

// ============================================================
// Service List
// ============================================================

async function loadServiceList() {
  try {
    const r = await api('GET', '/api/list-detail');
    if (r.ok) { allItems = r.items || []; }
    else { allItems = []; }
  } catch { allItems = []; }
  renderServiceList();
}

function renderServiceList() {
  const listEl = document.getElementById('serviceList');
  const filter = (document.getElementById('searchInput')?.value || '').toLowerCase();
  let items = allItems;
  if (filter) {
    items = items.filter(it =>
      it.service.toLowerCase().includes(filter) ||
      (it.username || '').toLowerCase().includes(filter)
    );
  }

  document.getElementById('itemCount').textContent = items.length ? `(${items.length})` : '';

  if (items.length === 0 && !filter) {
    listEl.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No credentials yet. Click "+ Add" to store your first password.</p></div>';
    return;
  }
  if (items.length === 0 && filter) {
    listEl.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No services matching "${escapeHtml(filter)}".</p></div>`;
    return;
  }

  listEl.innerHTML = items.map(it => `
    <div class="service-item${currentService === it.service ? ' selected' : ''}" data-service="${escapeHtml(it.service)}">
      <div class="svc-info">
        <span class="svc-name">🔑 ${escapeHtml(it.service)}</span>
        <span class="svc-user">👤 ${escapeHtml(it.username || '(no username)')}</span>
      </div>
      <span class="item-actions">
        <button class="btn btn-sm edit-item-btn" data-service="${escapeHtml(it.service)}" title="Edit">✏️</button>
        <button class="btn btn-sm btn-danger del-item-btn" data-service="${escapeHtml(it.service)}" title="Delete">🗑</button>
      </span>
    </div>
  `).join('');

  listEl.querySelectorAll('.service-item').forEach(item => {
    item.onclick = (e) => {
      if (e.target.closest('button')) return;
      selectService(item.dataset.service);
      resetLockTimer();
    };
  });

  listEl.querySelectorAll('.edit-item-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); showModal('edit', btn.dataset.service); };
  });

  listEl.querySelectorAll('.del-item-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const svc = btn.dataset.service;
      if (!confirm(`Delete "${svc}"? This cannot be undone.`)) return;
      deleteService(svc);
    };
  });
}

// ============================================================
// Service Detail (inline panel)
// ============================================================

async function selectService(service) {
  currentService = service;
  showPassword = false;
  passwordPlain = '';

  const r = await api('POST', '/api/get', { service });
  if (!r.ok) {
    toast(r.error || 'Could not retrieve credential.', 'error');
    return;
  }
  passwordPlain = r.password || '';

  const panel = document.getElementById('detailPanel');
  panel.style.display = '';
  panel.innerHTML = `
    <div class="detail-panel">
      <div class="detail-row">
        <span class="dl">Service</span>
        <span class="dv">${escapeHtml(service)}</span>
      </div>
      <div class="detail-row">
        <span class="dl">Username</span>
        <span class="dv">${escapeHtml(r.username || '(empty)')}</span>
      </div>
      <div class="detail-row">
        <span class="dl">Password</span>
        <span class="dv masked" id="detailPassword" title="Click to reveal">••••••••••••</span>
        <button class="btn btn-sm btn-icon" id="copyPwBtn" style="display:none;" title="Copy">📋</button>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;">
        <button class="btn btn-sm" id="panelEditBtn">✏️ Edit</button>
        <button class="btn btn-danger btn-sm" id="panelDeleteBtn">🗑 Delete</button>
      </div>
    </div>
  `;

  document.getElementById('detailPassword').onclick = togglePassword;
  document.getElementById('copyPwBtn').onclick = copyPassword;
  document.getElementById('panelEditBtn').onclick = () => showModal('edit', service);
  document.getElementById('panelDeleteBtn').onclick = () => {
    if (!confirm(`Delete "${service}"? This cannot be undone.`)) return;
    deleteService(service);
  };

  renderServiceList();
  resetLockTimer();
}

function togglePassword() {
  const pwEl = document.getElementById('detailPassword');
  const copyBtn = document.getElementById('copyPwBtn');
  if (!pwEl) return;
  showPassword = !showPassword;
  if (showPassword) {
    pwEl.textContent = passwordPlain;
    pwEl.className = 'dv';
    pwEl.style.cursor = 'default';
    pwEl.title = '';
    if (copyBtn) copyBtn.style.display = '';
    // Auto-mask after PASSWORD_MASK_SEC seconds
    if (maskTimer) clearTimeout(maskTimer);
    maskTimer = setTimeout(() => {
      if (showPassword) togglePassword();
    }, PASSWORD_MASK_SEC * 1000);
  } else {
    pwEl.textContent = '••••••••••••';
    pwEl.className = 'dv masked';
    pwEl.style.cursor = 'pointer';
    pwEl.title = 'Click to reveal';
    if (copyBtn) copyBtn.style.display = 'none';
    if (maskTimer) { clearTimeout(maskTimer); maskTimer = null; }
  }
}

async function copyPassword() {
  if (!passwordPlain) return;
  try {
    await navigator.clipboard.writeText(passwordPlain);
    toast('Password copied. Clears in 30s.', 'success');
    setTimeout(async () => {
      try { const t = await navigator.clipboard.readText(); if (t === passwordPlain) await navigator.clipboard.writeText(''); } catch {}
    }, 30000);
  } catch { toast('Copy failed.', 'error'); }
}

async function deleteService(service) {
  const r = await api('POST', '/api/delete', { service });
  if (r.ok) {
    toast(`"${service}" deleted.`, 'success');
    if (currentService === service) {
      currentService = null;
      document.getElementById('detailPanel').style.display = 'none';
    }
    await loadServiceList();
    await api('POST', '/api/save');
  } else {
    toast(r.error || 'Delete failed.', 'error');
  }
  resetLockTimer();
}

// ============================================================
// Escape HTML
// ============================================================

function escapeHtml(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

// ============================================================
// Refresh UI
// ============================================================

async function refreshUI() {
  if (!unlocked) return;

  const status = await refreshStatus();
  const actionsEl = document.getElementById('vaultActions');

  actionsEl.innerHTML = `
    <button class="btn btn-primary" id="createVaultBtn">🏗 Create Vault</button>
    <button class="btn" id="loadVaultBtn">📂 Load from File</button>
    <button class="btn" id="saveVaultBtn" style="display:none;">💾 Save Vault</button>
    <span style="font-size:0.8rem;color:var(--text-dim);display:flex;align-items:center;margin-left:8px;" id="vaultInfo"></span>
  `;
  document.getElementById('createVaultBtn').onclick = doCreate;
  document.getElementById('loadVaultBtn').onclick = doLoad;
  document.getElementById('saveVaultBtn').onclick = doSave;

  if (status.ok && status.loaded) {
    document.getElementById('listCard').style.display = '';
    document.getElementById('saveVaultBtn').style.display = '';
    document.getElementById('vaultInfo').textContent = '✅ Loaded';
    await loadServiceList();
    try {
      const v = await api('GET', '/api/versions');
      if (v.ok) document.getElementById('vaultInfo').textContent = `✅ v${v.format_version} · state #${v.state_version}`;
    } catch {}
  } else {
    document.getElementById('listCard').style.display = 'none';
    document.getElementById('detailPanel').style.display = 'none';
    currentService = null;
    document.getElementById('saveVaultBtn').style.display = 'none';
    document.getElementById('vaultInfo').textContent = '⚠️ Not loaded';
  }
}

// ============================================================
// Event Bindings
// ============================================================

document.getElementById('searchInput').addEventListener('input', renderServiceList);
document.getElementById('addBtn').onclick = () => showModal('add');
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    // Close modal if open
    if (document.getElementById('modalOverlay').style.display === 'flex') {
      hideModal();
      return;
    }
    // If password is revealed, mask it
    if (showPassword) {
      togglePassword();
    }
    // If detail panel is open, close it and wipe
    if (currentService) {
      wipeSensitiveData();
      renderServiceList();
    }
  }
});

// ============================================================
// Init
// ============================================================

document.getElementById('pinInput').focus();
setInterval(async () => { if (unlocked) await refreshStatus(); }, 30000);
</script>
